services:
  api:
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8080
      RECIPE_MIXER_DB_PATH: /data/recipe-mixer.sqlite
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      PUBLIC_APP_ORIGIN: ${PUBLIC_APP_ORIGIN:?PUBLIC_APP_ORIGIN is required}
    restart: unless-stopped

  web:
    restart: unless-stopped

